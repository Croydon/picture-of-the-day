name: Build and Test Package

on: [push, pull_request]

jobs:
  tests:
    name: "Testing"
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.14"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .
          pip install .[tests]

      - name: Build package
        run: |
          python -m build

      - name: Run tests
        run: |
          pytest -v
